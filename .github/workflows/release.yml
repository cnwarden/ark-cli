name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Build package
        run: uv build

      - name: Upload to TOS
        env:
          TOS_ACCESS_KEY: ${{ secrets.TOS_ACCESS_KEY }}
          TOS_SECRET_KEY: ${{ secrets.TOS_SECRET_KEY }}
        run: |
          VERSION=$(uv run python -c "from ark_cli import __version__; print(__version__)")
          uv run ark-cli -p tos -a upload -bucket xmp -i dist/ark_cli-${VERSION}-py3-none-any.whl -o ark-cli/ark_cli-${VERSION}-py3-none-any.whl

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
